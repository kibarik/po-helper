  takeaways:
    - {title: "Всё крутится вокруг витрины Ticketland", note: "4 направления — это то, что мы с ней делаем"}
    - {title: "Главное — увести её со старой базы на TicketsCloud", note: "это шаг к августу, обещанный руководителю"}
