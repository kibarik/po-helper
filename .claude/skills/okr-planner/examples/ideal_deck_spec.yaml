  - name: Дешевле Live
    color: "#2F7D54"
    number: 4
    blurb: "Старую витрину Live закрыть нельзя — потеряем поисковый трафик (SEO). Но поддерживать её отдельно дорого."
    objs:
      - id: OBJ4
        title: Дешевле Live
        krs:
          - id: "4.1"
            title: "Дешевле Live: исследование и планы (4.1 / 4.2 / 4.3)"
            now: "Витрина Live на своей отдельной начинке — дорого сопровождать."
            becomes: "Планы (БФТ) заменить начинку Live на компоненты Ticketland. В этом квартале — только исследование."
            steps:
              - {role: PO, text: "Виджет Live → TL-виджет · БФТ границ замены (4.2)"}
              - {role: SA, text: "Виджет Live → TL-виджет · Оценка переписывания виджета"}
              - {role: BE, text: "Виджет Live → TL-виджет · Демо: iFrame TLND на live.mts.ru"}
              - {role: PO, text: "Каталог Live из UMC · БФТ границ (4.1)"}
              - {role: ADR, text: "Каталог Live из UMC · Как переключить наполнение Live на UMC"}
              - {role: SA, text: "Каталог Live из UMC · Подробный план"}
              - {role: PO, text: "VK билеты → TL-виджет · БФТ границ для VK (4.3)"}
              - {role: ADR, text: "VK билеты → TL-виджет · План замены виджета"}
              - {role: SA, text: "VK билеты → TL-виджет · Зависит от авторизации федераций"}
            risks:
              - {text: "Старый виджет TLND для Live может не работать — переписывать"}
              - {text: "VK работают на виджете Live — базово не переключатся"}
              - {text: "Неясна бизнес-ценность и границы на старте"}
              - {text: "Разработка — в следующих кварталах"}
            sprint_cells: {S2: [PO·SA], S3: [SA·ADR], S4: [PO], S5: [PO]}
            owners: [Ишманов, Грудинин, Чеботков]
