product: GDS
quarter: Q3-2026
subtitle: витрина Ticketland
footer: "GDS · Q3 · витрина Ticketland"
directions:
  - name: Надёжный источник
    color: "#E4002B"
    number: 1
    blurb: "Витрина берёт данные из старой базы БАЗИС и падает вместе с ней. Большой многоквартальный переход (Q2 2026 → Q4 2027) — в Q3 закладываем фундамент: план переключения шлюзов и первые шаги."
    objs:
      - id: OBJ1
        title: Надёжный источник данных
        krs:
          - id: "1.1"
            title: Продажа мероприятий TicketsCloud на витрине, минуя БАЗИС
            now: "Мероприятия TicketsCloud продаются, но данные идут через старую базу БАЗИС — витрина зависит от неё."
            becomes: "Те же мероприятия продаются на витрине, но попадают туда через UMC конвекторы."
            steps:
              - {role: BA, text: "Изучение API TicketsCloud"}
              - {role: SA, text: "Исследование коннектора UMC → web_db"}
              - {role: ADR, text: "Согласование dataflow UMC → Ticketland"}
              - {role: ADR, text: "Согласование целевого dataflow"}
              - {role: DBA, text: "Валидация работы с базой"}
              - {role: SA, text: "Правила доступности и дедуб (1.1.E1)"}
              - {role: BE, text: "TicketsCloud → UMC"}
              - {role: BE, text: "UMC → web_db"}
              - {role: BE, text: "web_db → Ticketland.BFF"}
              - {role: FE, text: "Виджет на витрине"}
              - {role: QA, text: "Отладка генерации виджета TC"}
              - {role: RELEASE, text: "Пошаговая раскатка в прод"}
              - {role: ADR, text: "Коммитмент перед ГД — август"}
            risks:
              - {text: "Блокер: дедубликация web_db (KR 1.1.E1)"}
              - {text: "Внешний TC: медленный API, доработки на их стороне"}
              - {text: "FE: возможны доработки аллокации виджета"}
              - {text: "Без дедуба — кратная нагрузка на web_db и sphinx"}
              - {text: "UMC: доработка дедубликатора и правил доступности"}
              - {text: "Жёсткий срок — коммитмент перед ГД (август)"}
            sprint_cells: {S1: [SA·ADR], S2: ["UMC + GDS + FE"], S3: [QA], S4: ["RM ★"]}
            owners: [Чеботков, Ананьев, Семёнов, Волегов]
            src: "OKR-Q3-2026.md#KR-1.1"
          - id: "1.2"
            title: Заказы и возвраты TicketsCloud в личном кабинете
            now: "Заказы через TicketsCloud не видны в личном кабинете; вернуть или обменять билет нельзя."
            becomes: "Заказы TicketsCloud видны в ЛК; билет можно скачать, вернуть и обменять — не выходя из Ticketland."
            steps:
              - {role: BA, text: "Сбор и описание БФТ"}
              - {role: SA, text: "Первичная аналитика"}
              - {role: SA, text: "Декомпозиция и разработка"}
              - {role: BE, text: "US1 · Доработки на стороне TC по Kafka"}
              - {role: BE, text: "US1 · Сохранение заказов"}
              - {role: BE, text: "US1 · Доработка BFF для вывода заказов"}
              - {role: FE, text: "US1 · Логика отображения заказов"}
              - {role: QA, text: "US1 · Отладка"}
              - {role: RELEASE, text: "US1 в Production"}
              - {role: ADR, text: "US2 · Согласование дизайна решений (возвраты)"}
              - {role: BE, text: "US2 · Механизм возвратов + доработка BFF"}
              - {role: FE, text: "US2 · Отображение в ЛК Ticketland"}
              - {role: ADR, text: "US3 · Согласование дизайна решений (обмен)"}
              - {role: BE, text: "US3 · Механизм обмена + доработка BFF"}
              - {role: QA, text: "US2/US3 · Отладка"}
              - {role: RELEASE, text: "US2/US3 в Production"}
            risks:
              - {text: "US2/US3 не исследованы на старте — объём может меняться"}
              - {text: "Задержки на стороне TC по Kafka"}
              - {text: "Юридические риски (пользовательские соглашения) — задержка релиза"}
              - {text: "Legacy при коннекте TC и TL.DBA — сроки могут слететь"}
              - {text: "Кроссфункциональные взаимодействия TC / TL / DevOps — задержка"}
            sprint_cells: {S1: [BA·SA], S2: ["Live, PHP, GO"], S3: ["Live, PHP, GO"], S4: [QA], S5: [RM]}
            owners: [Ананьев, Величко, Волегов, Лисин]
            src: "OKR-Q3-2026.md#KR-1.2"
  - name: Больше на витрине
    color: "#2E4B7A"
    number: 2
    blurb: "Чем больше можно купить на витрине — тем больше продаём. Добавляем кино, рестораны и улучшаем контент. Часть — долги прошлого квартала."
