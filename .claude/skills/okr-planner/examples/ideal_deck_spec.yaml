  quarter_shift: "Главный сдвиг года: уводим витрину со старой билетной базы (БАЗИС) на новую систему TicketsCloud. Тотальное обновление витрины TLND и обогащение новыми фичами (кино, рестораны, рекомендации, скидки) для роста внутренних конверсий."
  glossary:
    - {term: "Витрина Ticketland, LIVE, VTB", plain: "сайт ticketland.ru, live.mts.ru и тп, где покупают билеты"}
    - {term: "БАЗИС", plain: "старая билетная база — сейчас на ней держится вся витрина"}
    - {term: "TicketsCloud", plain: "новая билетная система, куда переезжаем"}
    - {term: "Виджет", plain: "виджет tlnd в формате iframe на сайтах партнёров (ВК, БДТ, Вахтангова)"}
    - {term: "UMC / Live.PaaS", plain: "платформы, где хранятся билетная информация (Live) и каталоги (UMC)"}
    - {term: "Шлюзы (BI / extapi)", plain: "вход — партнёрские мероприятия к нам; выход — продажа наших партнёрам"}
  order_of_work:
    now:
      - "Докатить кино и рестораны (долги прошлого квартала)"
      - "Починить критбаги: ТБанк и места"
      - "Заложить новый источник данных для витрины"
    august:
