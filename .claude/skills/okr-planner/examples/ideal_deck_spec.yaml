      - id: OBJ2
        title: Больше на витрине
        krs:
          - id: "2.4"
            title: Кино на витрине — релиз фичи с поиском
            now: "Кино не доведено до витрины: его не найти в поиске, нет в афише и на полках."
            becomes: "Кино в поиске, афише и на полках рядом с театрами — единый путь (US1–US4 из Q2)."
            steps:
              - {role: SA, text: "Карточка релиза + задача в Jira"}
              - {role: SA, text: "СТ полок и детальных страниц"}
              - {role: BE, text: "US1 · Разработка по системным требованиям"}
              - {role: DBA, text: "US1 · Загрузка кино в базу до прода"}
              - {role: BLOCKER, text: "US1 · CI/CD от DevOps"}
              - {role: RELEASE, text: "US1 · Раскатка Поиск → Preview → Detail"}
              - {role: FE, text: "US2 · Детальная страница поиска"}
              - {role: FE, text: "US2 · Афиша и полки с кино"}
              - {role: QA, text: "US2 · Проверка CJM на проде"}
              - {role: SA, text: "US3 · Коннектор UMC → web_db (2.3.1)"}
              - {role: BE, text: "US3 · P24 → UMC → web_db, минуя uat_db"}
              - {role: RELEASE, text: "US3 · Пошаговая раскатка"}
            risks:
              - {text: "SSR-страницы (2.4.2) и техдолг маппинга (2.4.3) — вынесены из квартала"}
              - {text: "Блокатор Q2: доработки UI внешней команды"}
              - {text: "Ранжирование кино — recsys вне команды GDS"}
              - {text: "Каталог через UMC ждёт интеграцию MRS → web_db"}
              - {text: "Нет широкоформатных картинок для смешанных полок"}
            sprint_cells: {S1: [BE·PHP], S2: [QA·RM, SA], S3: [BE·Go], S4: [QA], S5: [RM]}
            owners: [Юдин, Величко, Лисин]
            src: "OKR-Q3-2026.md#KR-2.4"
          - id: "2.5"
            title: "Рестораны на витрине: письма и поиск (2.5 / 2.1)"
            now: "Нет ресторанной коммуникации рядом с мероприятием; полнотекстовый поиск ресторанов не работает."
            becomes: "Письмо с подборкой ресторанов за час до мероприятия; фильтр по Пушкинской карте (поиск ресторанов — вне квартала)."
            steps:
              - {role: BE, text: "Разработка email завершена в Q2 — нужен релиз под нагрузкой"}
              - {role: BE, text: "US1 · Webhook MRS"}
              - {role: BE, text: "US1 · Ручка WebNotifier + шаблон письма"}
              - {role: BE, text: "US1 · Sendsay-шаблоны + worker прогрева кэша"}
              - {role: BLOCKER, text: "US1 · Внешние блокеры на стороне MRS"}
              - {role: QA, text: "US1 · Отладка"}
              - {role: RELEASE, text: "US1 · В прод под нагрузкой"}
              - {role: SA, text: "US2 · Правила исключения по Пушкинской карте"}
              - {role: BE, text: "US2 · Фильтр покупателей в рассылке"}
              - {role: BE, text: "US3 · Догоняющее письмо о ресторанах"}
              - {role: QA, text: "US2/US3 · Отладка"}
              - {role: RELEASE, text: "US2/US3 · В прод"}
