              - {text: "Блокеры на стороне MRS задерживают релиз писем"}
              - {text: "Нагрузка на рассылки не проверена в бою"}
              - {text: "Активные изменения API Bartello и MRS"}
            sprint_cells: {S1: [BE·PHP], S2: ["блокеры MRS"], S3: [RM]}
            owners: [Юдин, Гимранов]
            src: "OKR-Q3-2026.md#KR-2.5"
          - id: "2.2"
