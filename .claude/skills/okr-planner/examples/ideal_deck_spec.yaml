    - {title: "Докатить письма по ресторанам", note: "долг прошлого квартала"}
    - {title: "Починить критбаги: ТБанк и места", note: "теряем продажи прямо сейчас"}
    - {title: "Заложить новый источник данных", note: "демо: мероприятие TicketsCloud доезжает до витрины без старой базы"}
