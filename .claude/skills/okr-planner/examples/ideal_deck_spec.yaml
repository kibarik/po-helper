  - name: Стабильность
    color: "#0F7A8C"
    number: 3
    blurb: "Часть продаж теряется прямо сейчас: из-за багов места не бронируются, а платежи после переезда не доведены. Чиним в первую очередь — эффект виден сразу."
    objs:
      - id: OBJ3
        title: Стабильность витрины
        krs:
          - id: "3.3"
            title: "Критические баги: чиним в первую очередь (3.3 / 3.4)"
            now: "Часть продаж теряется: ТБанк видит «мест нет», часть мест не бронируется."
            becomes: "Бронирование корректно; все места снова доступны."
            steps:
              - {role: SA, text: "ТБанк 404 · Диагностика гонки (datarace) в extapi_go"}
              - {role: BE, text: "ТБанк 404 · Фикс гонки при параллельных запросах"}
              - {role: QA, text: "ТБанк 404 · Регресс параллельного бронирования"}
              - {role: SA, text: "Seatless · Согласование маркировки секций"}
              - {role: BE, text: "Seatless · Фикс конфликта BI / БАЗИС / SVG-эдитор"}
              - {role: QA, text: "Seatless · Мониторинг после фикса"}
            risks:
              - {text: "ТБанк: тянется из Q2 (в ожидании)"}
              - {text: "Seatless: ≈2% продаж теряется, пока не исправлено"}
              - {text: "Разная разметка между BI, БАЗИС и SVG-эдитором"}
            sprint_cells: {S1: [BE·Go, BE], S2: [QA]}
            owners: [Сморкалов, Просвирнин]
            src: "OKR-Q3-2026.md#KR-3.3"
          - id: "3.5"
            title: Платежи после переезда на Live
            now: "Остались незавершённые методы (СБП, ВТБ, рассрочка); процессинг не держит пиковую нагрузку."
            becomes: "Все методы оплаты работают на 100%; процессинг держит нагрузку крупных продаж."
            steps:
              - {role: BE, text: "Запуск финтех A/B нового процессинга"}
              - {role: SA, text: "ВТБ+Пушка · Анализ доработок на Live"}
              - {role: BE, text: "ВТБ+Пушка · Оплата через ВТБ + Пушкинская карта"}
              - {role: QA, text: "ВТБ+Пушка · Проверка оплат ВТБ"}
              - {role: BE, text: "СБП/рассрочка · СБП через MTS Pay на 100%"}
              - {role: BE, text: "СБП/рассрочка · BNPL (рассрочка) на 100%"}
              - {role: QA, text: "СБП/рассрочка · Приёмка финтеха"}
              - {role: BE, text: "Платформа · Мониторинг + трассировка"}
              - {role: BE, text: "Платформа · Объединение payment + callback"}
              - {role: QA, text: "Платформа · Нагрузочное тестирование 500 rpm"}
              - {role: BE, text: "Платформа · Автотесты, TraceId, синхро сред"}
            risks:
              - {text: "Постоянные проблемы с MTS Pay"}
              - {text: "ВТБ через MTS Pay — риск неполного процесса оплаты"}
              - {text: "Низкое качество тестирования на стороне MTS Pay"}
              - {text: "Автоскейлинг: текущий процессинг не держит нагрузку Вахтангова"}
            sprint_cells:
              S1: [BE·C#]
              S2: [QA, SA, BE·C#]
              S3: [RM, BE·C#]
              S4: [QA, НТ, BE]
              S5: [RM, QA]
              S6: [RM]
