# PR-Agent GitHub App for Dokploy (Compose service type).
#
# All secrets come from the Dokploy "Environment" tab. Set these 4:
#   OPENAI_KEY                z.ai GLM-5 API key
#   GITHUB_APP_ID             the App's ID
#   GITHUB_WEBHOOK_SECRET     the webhook secret
#   GITHUB_PRIVATE_KEY_B64    base64 of the App's .pem (single line — see DOKPLOY.md)
# The PEM is base64 (single line, so env substitution can't mangle newlines);
# the entrypoint below decodes it into .secrets.toml at startup, because a raw
# multiline PEM in env fails to parse ("Failed to get git provider").
# Model/provider default to z.ai GLM-5 — override via the *_ vars if needed.
#
# TLS + routing handled by Dokploy Traefik (or plain HTTP for traefik.me).
services:
  pr-agent:
    build:
      context: https://github.com/qodo-ai/pr-agent.git
      dockerfile: docker/Dockerfile
      target: github_app
    image: pr-agent-github-app:local
    restart: unless-stopped
    environment:
      - PORT=3000
      # --- LLM (z.ai GLM-5) ---
      - "OPENAI.KEY=${OPENAI_KEY}"
      - "OPENAI.API_BASE=${OPENAI_API_BASE:-https://api.z.ai/api/coding/paas/v4}"
      - "CONFIG.MODEL=${CONFIG_MODEL:-openai/glm-5}"
      - "CONFIG.MODEL_TURBO=${CONFIG_MODEL:-openai/glm-5}"
      - "CONFIG.FALLBACK_MODELS=${CONFIG_FALLBACK_MODELS:-[\"openai/glm-5\"]}"
      - "CONFIG.CUSTOM_MODEL_MAX_TOKENS=${CONFIG_MAX_TOKENS:-128000}"
      - "CONFIG.GIT_PROVIDER=github"
      # --- GitHub App (consumed by the entrypoint, written into .secrets.toml) ---
      - "GITHUB_APP_ID=${GITHUB_APP_ID}"
      - "GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}"
      - "GITHUB_PRIVATE_KEY_B64=${GITHUB_PRIVATE_KEY_B64}"
    # pr-agent loads .secrets.toml and REPLACES the whole [github] table with
    # whatever the file contains — so the file must carry every github.* value,
    # not just the key (otherwise app_id/webhook_secret vanish). The entrypoint
    # writes the full [github] block (PEM decoded from base64) then execs the
    # image's github_app server command. $$ escapes compose interpolation so the
    # values are read from the container env at runtime.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /app/pr_agent/settings
        {
          printf '[github]\n'
          printf 'deployment_type = "app"\n'
          printf 'app_id = "%s"\n' "$$GITHUB_APP_ID"
          printf 'webhook_secret = "%s"\n' "$$GITHUB_WEBHOOK_SECRET"
          printf 'private_key = """\n'
          printf '%s' "$$GITHUB_PRIVATE_KEY_B64" | base64 -d
          printf '\n"""\n'
        } > /app/pr_agent/settings/.secrets.toml
        exec python -m gunicorn -k uvicorn.workers.UvicornWorker \
          -c pr_agent/servers/gunicorn_config.py --forwarded-allow-ips '*' \
          pr_agent.servers.github_app:app
    expose:
      - "3000"
