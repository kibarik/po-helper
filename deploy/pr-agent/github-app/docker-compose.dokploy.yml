# PR-Agent GitHub App for Dokploy (Compose service type).
#
# Differences from docker-compose.yml:
#   - No Caddy: Dokploy's built-in Traefik terminates TLS (Let's Encrypt).
#   - No ports: Dokploy routes the domain to this service over its own network.
#   - Builds straight from the upstream git URL as context — no local clone,
#     so Dokploy can build it from just this compose file.
#   - Secrets come from a Dokploy "File Mount" at the path below, not a local
#     .secrets.toml (see DOKPLOY.md).
services:
  pr-agent:
    build:
      context: https://github.com/qodo-ai/pr-agent.git
      dockerfile: docker/Dockerfile
      target: github_app
    image: pr-agent-github-app:local
    restart: unless-stopped
    environment:
      - PORT=3000
    # Dokploy → this service → Domains: host = pr-agent.<your-domain>,
    # container port = 3000, HTTPS on, cert = Let's Encrypt.
    expose:
      - "3000"
    # Secrets file supplied via Dokploy "File Mount":
    #   Mount Path: /app/pr_agent/settings/.secrets.toml
    #   Content:    filled-in copy of .secrets.toml.example
