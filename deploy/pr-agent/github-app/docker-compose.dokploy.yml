# PR-Agent GitHub App for Dokploy (Compose service type).
#
# pr-agent's dotted env vars (OPENAI.KEY, CONFIG.MODEL, GITHUB.APP_ID, ...) are
# NOT picked up in this setup, and [config]/[openai] can't be set from the repo
# .pr_agent.toml (host-restricted). So the entrypoint writes ALL host settings
# into .secrets.toml at startup from plain underscore env vars.
#
# Set in Dokploy → Environment:
#   OPENAI_KEY               z.ai GLM-5 API key   (required)
#   GITHUB_APP_ID            the App's ID         (required)
#   GITHUB_WEBHOOK_SECRET    the webhook secret   (required)
#   GITHUB_PRIVATE_KEY_B64   base64 of the .pem   (required, single line)
#   OPENAI_API_BASE          override LLM base    (optional, default z.ai)
#   CONFIG_MODEL             override model       (optional, default openai/glm-5)
#   CONFIG_MAX_TOKENS        override max tokens  (optional, default 128000)
#
# TLS + routing handled by Dokploy Traefik (or plain HTTP for traefik.me).
services:
  pr-agent:
    build:
      context: https://github.com/qodo-ai/pr-agent.git
      dockerfile: docker/Dockerfile
      target: github_app
    image: pr-agent-github-app:local
    restart: unless-stopped
    environment:
      - PORT=3000
      - "OPENAI_KEY=${OPENAI_KEY}"
      - "OPENAI_API_BASE=${OPENAI_API_BASE:-}"
      - "CONFIG_MODEL=${CONFIG_MODEL:-}"
      - "CONFIG_MAX_TOKENS=${CONFIG_MAX_TOKENS:-}"
      - "GITHUB_APP_ID=${GITHUB_APP_ID}"
      - "GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}"
      - "GITHUB_PRIVATE_KEY_B64=${GITHUB_PRIVATE_KEY_B64}"
    # Write the full host config into .secrets.toml, then exec the image's
    # github_app server. $$ escapes compose interpolation so values are read from
    # the container env at runtime; ${VAR:-default} supplies sane fallbacks.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /app/pr_agent/settings
        {
          printf '[openai]\n'
          printf 'key = "%s"\n' "$$OPENAI_KEY"
          printf 'api_base = "%s"\n' "$${OPENAI_API_BASE:-https://api.z.ai/api/coding/paas/v4}"
          printf '\n[config]\n'
          printf 'git_provider = "github"\n'
          printf 'model = "%s"\n' "$${CONFIG_MODEL:-openai/glm-5}"
          printf 'model_turbo = "%s"\n' "$${CONFIG_MODEL:-openai/glm-5}"
          printf 'fallback_models = ["%s"]\n' "$${CONFIG_MODEL:-openai/glm-5}"
          printf 'custom_model_max_tokens = %s\n' "$${CONFIG_MAX_TOKENS:-128000}"
          printf '\n[github]\n'
          printf 'deployment_type = "app"\n'
          printf 'app_id = "%s"\n' "$$GITHUB_APP_ID"
          printf 'webhook_secret = "%s"\n' "$$GITHUB_WEBHOOK_SECRET"
          printf 'private_key = """\n'
          printf '%s' "$$GITHUB_PRIVATE_KEY_B64" | base64 -d
          printf '\n"""\n'
        } > /app/pr_agent/settings/.secrets.toml
        exec python -m gunicorn -k uvicorn.workers.UvicornWorker \
          -c pr_agent/servers/gunicorn_config.py --forwarded-allow-ips '*' \
          pr_agent.servers.github_app:app
    expose:
      - "3000"
